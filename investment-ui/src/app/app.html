<div class="app-layout" *ngIf="authService.isAuthenticated()">
  <nav class="app-nav-sidebar">
    <a class="nav-brand" routerLink="/">
      <span class="nav-logo">IA</span>
      <span>InvestmentApp</span>
    </a>

    <div class="nav-links">
      <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
      <!-- <a class="nav-link" routerLink="/dodaj" routerLinkActive="active">Dodaj inwestycję</a> -->
      <a class="nav-link" routerLink="/historia" routerLinkActive="active">Historia portfela</a>
    </div>

    <div class="nav-user-section">
      <div class="nav-user-info">
        <p class="nav-user-email">{{ currentUser?.email }}</p>
        <p class="nav-user-role">{{ currentUser?.role === 'Admin' ? 'Administrator' : 'Użytkownik' }}</p>
      </div>
      <button class="nav-logout-btn" (click)="logout()">Wyloguj się</button>
    </div>
  </nav>

  <div class="app-shell">
    <router-outlet></router-outlet>
  </div>
</div>

<div *ngIf="!authService.isAuthenticated()">
  <router-outlet></router-outlet>
</div>
