<div class="dashboard-header">
  <h1>Dashboard</h1>
  <p>Przegląd Twojego portfela inwestycyjnego</p>
</div>

<section class="kpi-section">
  <div class="kpi-container">
    <div class="kpi-card">
      <app-investment-summary-box></app-investment-summary-box>
    </div>
    <div class="kpi-card kpi-assets-card">
      <div class="section-panel">
        <div class="panel-title">
          <div>
            <h3>Twoje aktywa</h3>
            <p class="panel-subtitle">Podział portfela %</p>
          </div>
        </div>
        <app-investment-summary></app-investment-summary>
      </div>
    </div>
  </div>
  <p class="update-time-section">Ostatnia aktualizacja: {{ lastUpdateTime }}</p>
</section>

<section class="row g-4">
  <div class="col-lg-4">
    <div class="section-panel">
      <div class="panel-title">
        <div>
          <h3>Zysk / strata</h3>
          <p class="panel-subtitle">Wynik według kryptowaluty</p>
        </div>
      </div>
      <app-investment-chart></app-investment-chart>
    </div>
  </div>

  <div class="col-lg-8">
    <div class="section-panel">
      <div class="panel-title">
        <div>
          <h3>Zakupione aktywa</h3>
          <p class="panel-subtitle">Edytuj lub usuwaj pozycje</p>
          
        </div>
        <a class="nav-link-in-panel nav-link-in-panel-primary" routerLink="/dodaj" routerLinkActive="active">Dodaj inwestycję</a>
      </div>
      <app-investment-list></app-investment-list>
    </div>
  </div>
</section>
