<div class='glass-card chart-card h-100'>
  <div class='panel-title'>
    <div>
      <h3>Zysk / strata</h3>
      <p class='panel-subtitle'>Zysk lub strata według aktualnych cen</p>
    </div>
  </div>

  <div *ngIf='!isLoading'>
    <canvas baseChart
      [type]='chartType'
      [data]='chartData'
      [options]='chartOptions'>
    </canvas>
  </div>

  <div *ngIf='isLoading' class='text-muted'>
    Ładowanie wykresu...
  </div>
</div>
