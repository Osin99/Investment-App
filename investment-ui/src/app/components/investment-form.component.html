<section class="page-hero">
  <p class="page-kicker">{{ form.id ? 'Edycja pozycji' : 'Nowa pozycja' }}</p>
  <h1 class="page-title">{{ form.id ? 'Edytuj inwestycję' : 'Dodaj inwestycję' }}</h1>
  <p class="page-subtitle">
    Dodaj zakup kryptowaluty, aby aktualizować portfel i wykresy.
  </p>
  <div class="hero-actions">
    <a class="btn btn-outline-primary" routerLink="/">Wróć do dashboardu</a>
  </div>
</section>

<div class="glass-card">
  <form #f="ngForm" (ngSubmit)="submitForm()" class="needs-validation" novalidate>
    <div class="row g-4">
      <div class="col-md-6">
        <label for="symbol" class="form-label">Symbol</label>
        <input
          type="text"
          id="symbol"
          name="symbol"
          class="form-control"
          [(ngModel)]="form.symbol"
          placeholder="np. BTC"
          required />
      </div>

      <div class="col-md-6">
        <label for="amount" class="form-label">Ilość</label>
        <input
          type="number"
          id="amount"
          name="amount"
          class="form-control"
          [(ngModel)]="form.amount"
          placeholder="0.00000000"
          required
          min="0.00000001"
          step="any" />
      </div>

      <div class="col-md-6">
        <label for="buyPrice" class="form-label">Cena zakupu</label>
        <input
          type="number"
          id="buyPrice"
          name="buyPrice"
          class="form-control"
          [(ngModel)]="form.buyPrice"
          placeholder="Cena w PLN"
          required
          min="0"
          step="any" />
      </div>

      <div class="col-md-6">
        <label for="buyDate" class="form-label">Data zakupu</label>
        <input
          type="date"
          id="buyDate"
          name="buyDate"
          class="form-control"
          [(ngModel)]="form.buyDate"
          required />
      </div>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger mt-4">
      {{ errorMessage }}
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="f.invalid || isSaving">
        {{ isSaving ? 'Zapisywanie...' : 'Zapisz inwestycję' }}
      </button>
    </div>
  </form>
</div>
